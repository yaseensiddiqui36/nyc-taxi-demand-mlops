# Production overrides — always-on services only (no Airflow, no MLflow)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
version: "3.8"

services:
  postgres:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    restart: always

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    # No volume mounts in prod — code baked into image
    volumes: []
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      ENVIRONMENT: production
    volumes: []
    restart: always

  prometheus:
    restart: always

  grafana:
    restart: always
    environment:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/"
