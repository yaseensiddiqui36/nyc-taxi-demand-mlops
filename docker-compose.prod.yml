# Production overrides — always-on services only (no Airflow, no MLflow)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    restart: always

  api:
    image: ghcr.io/yaseensiddiqui36/nyc-taxi-demand-mlops-api:latest
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    volumes:
      - ./src:/app/src        # live code (allows registry.py updates without rebuild)
      - ./models:/app/models  # model file (not in image, deployed separately)
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  frontend:
    image: ghcr.io/yaseensiddiqui36/nyc-taxi-demand-mlops-frontend:latest
    environment:
      ENVIRONMENT: production
    restart: always

  prometheus:
    restart: always

  grafana:
    restart: always
    environment:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/"

  airflow-init:
    image: ghcr.io/yaseensiddiqui36/nyc-taxi-demand-mlops-airflow:latest

  airflow-webserver:
    image: ghcr.io/yaseensiddiqui36/nyc-taxi-demand-mlops-airflow:latest

  airflow-scheduler:
    image: ghcr.io/yaseensiddiqui36/nyc-taxi-demand-mlops-airflow:latest

  mlflow:
    image: ghcr.io/yaseensiddiqui36/nyc-taxi-demand-mlops-mlflow:latest
