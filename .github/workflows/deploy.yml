name: Deploy to AWS

on:
  workflow_run:
    workflows: ["Build & Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy always-on stack to AWS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.AWS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose files to server
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.yml \
            docker-compose.prod.yml \
            prometheus/prometheus.yml \
            ubuntu@${{ secrets.AWS_HOST }}:/home/ubuntu/nyc-taxi-demand-mlops/

      - name: Copy monitoring configs to server
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            grafana/ \
            ubuntu@${{ secrets.AWS_HOST }}:/home/ubuntu/nyc-taxi-demand-mlops/grafana/

      - name: Create .env on server
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.AWS_HOST }} "
            mkdir -p /home/ubuntu/nyc-taxi-demand-mlops
            cat > /home/ubuntu/nyc-taxi-demand-mlops/.env << 'ENVEOF'
          POSTGRES_USER=taxi
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=taxi_demand
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          REDIS_URL=redis://redis:6379
          REDIS_HOST=redis
          REDIS_PORT=6379
          MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION=us-east-1
          S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          GRAFANA_ADMIN_USER=admin
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          AIRFLOW_USERNAME=admin
          AIRFLOW_PASSWORD=${{ secrets.AIRFLOW_PASSWORD }}
          AIRFLOW_FERNET_KEY=${{ secrets.AIRFLOW_FERNET_KEY }}
          AIRFLOW_SECRET_KEY=${{ secrets.AIRFLOW_SECRET_KEY }}
          AIRFLOW_UID=50000
          ENVIRONMENT=production
          LOG_LEVEL=INFO
          BACKFILL_MONTHS=12
          ENVEOF
          "

      - name: Free disk space on server
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.AWS_HOST }} "
            docker system prune -f --volumes 2>/dev/null || true
            df -h /
          "

      - name: Pull images and restart services
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.AWS_HOST }} "
            cd /home/ubuntu/nyc-taxi-demand-mlops &&
            docker compose pull &&
            docker compose up -d --remove-orphans
          "

      - name: Health check
        run: |
          sleep 30
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.AWS_HOST }} \
            "curl -sf http://localhost:8000/health | python3 -m json.tool"

      - name: Notify deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\": \"Deployment ${STATUS}: nyc-taxi-demand-mlops @ \`${{ github.sha }}\`\"}" || true
