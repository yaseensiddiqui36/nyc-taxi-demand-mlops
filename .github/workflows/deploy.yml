name: Deploy to AWS

on:
  workflow_run:
    workflows: ["Build & Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy always-on stack to AWS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.AWS_HOST }} >> ~/.ssh/known_hosts

      - name: Create project directory on server
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.AWS_HOST }} \
            "mkdir -p /home/ubuntu/nyc-taxi-demand-mlops/prometheus /home/ubuntu/nyc-taxi-demand-mlops/grafana /home/ubuntu/nyc-taxi-demand-mlops/scripts /home/ubuntu/nyc-taxi-demand-mlops/docker /home/ubuntu/nyc-taxi-demand-mlops/feature_repo"

      - name: Clean pycache on server (owned by root from Docker mounts)
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.AWS_HOST }} \
            "sudo find /home/ubuntu/nyc-taxi-demand-mlops -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null; echo 'pycache cleaned'"

      - name: Copy project files to server
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" \
            --exclude='**/__pycache__' \
            --exclude='**/*.pyc' \
            --filter='protect models/' \
            --include='docker-compose.yml' \
            --include='docker-compose.prod.yml' \
            --include='requirements.txt' \
            --include='requirements.api.txt' \
            --include='requirements.frontend.txt' \
            --include='conftest.py' \
            --include='setup.py' \
            --include='pyproject.toml' \
            --include='docker/***' \
            --include='scripts/***' \
            --include='src/***' \
            --include='airflow/***' \
            --include='feature_repo/***' \
            --include='prometheus/***' \
            --include='grafana/***' \
            --exclude='*' \
            ./ \
            ubuntu@${{ secrets.AWS_HOST }}:/home/ubuntu/nyc-taxi-demand-mlops/

      - name: Create .env on server
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.AWS_HOST }} "
            cat > /home/ubuntu/nyc-taxi-demand-mlops/.env << 'ENVEOF'
          POSTGRES_USER=taxi
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=taxi_demand
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          REDIS_URL=redis://redis:6379
          REDIS_HOST=redis
          REDIS_PORT=6379
          MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION=us-east-1
          S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          GRAFANA_ADMIN_USER=admin
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          AIRFLOW_USERNAME=admin
          AIRFLOW_PASSWORD=${{ secrets.AIRFLOW_PASSWORD }}
          AIRFLOW_FERNET_KEY=${{ secrets.AIRFLOW_FERNET_KEY }}
          AIRFLOW_SECRET_KEY=${{ secrets.AIRFLOW_SECRET_KEY }}
          AIRFLOW_UID=50000
          ENVIRONMENT=production
          LOG_LEVEL=INFO
          BACKFILL_MONTHS=12
          ENVEOF
          "

      - name: Free disk space on server
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.AWS_HOST }} "
            docker system prune -af --volumes 2>/dev/null || true
            sudo journalctl --vacuum-size=50M 2>/dev/null || true
            sudo apt-get clean 2>/dev/null || true
            df -h /
          "

      - name: Pull images (sequential to manage disk space)
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.AWS_HOST }} "
            cd /home/ubuntu/nyc-taxi-demand-mlops &&
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin &&
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull postgres redis prometheus grafana &&
            docker image prune -f &&
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api frontend &&
            docker image prune -f &&
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull mlflow &&
            docker image prune -f &&
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull airflow-init airflow-webserver airflow-scheduler &&
            docker image prune -f &&
            df -h /
          "

      - name: Start services
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.AWS_HOST }} "
            cd /home/ubuntu/nyc-taxi-demand-mlops &&
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --remove-orphans
          "

      - name: Health check
        run: |
          sleep 60
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.AWS_HOST }} \
            "curl -sf http://localhost:8000/health | python3 -m json.tool || echo 'Health check pending — services may still be starting'"

      - name: Notify deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\": \"Deployment ${STATUS}: nyc-taxi-demand-mlops @ \`${{ github.sha }}\`\"}" || true
