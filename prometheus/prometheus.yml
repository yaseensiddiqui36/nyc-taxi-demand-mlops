global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "nyc-taxi-demand-mlops"
    environment: "production"

scrape_configs:
  # FastAPI application metrics (via prometheus-fastapi-instrumentator)
  - job_name: "taxi_demand_api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Grafana self-monitoring
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
    metrics_path: /metrics
